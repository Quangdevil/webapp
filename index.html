<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QuangDurenOnline</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20128%20128%22%3E%3Crect%20width%3D%22128%22%20height%3D%22128%22%20rx%3D%2228%22%20fill%3D%22%230f766e%22/%3E%3C/svg%3E"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20128%20128%22%3E%3Crect%20width%3D%22128%22%20height%3D%22128%22%20rx%3D%2228%22%20fill%3D%22%230f766e%22/%3E%3C/svg%3E"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <h1>QuangDurenOnline_V19_3_ui_dong_tien_split_input_history</h1>
      <p>Dữ liệu lưu vào Supabase: parties, sales, flows, lots, lot_items, lot_costs.</p>
      <p class="status" id="statusLine">Chưa kết nối</p>
    </div>
    <details class="top-actions">
      <summary>Tác vụ</summary>
      <div class="actions">
        <button onclick="syncAll()">Đồng bộ</button>
        <button onclick="showTab('setup')">Đăng nhập</button>
        <button onclick="exportData()">Backup JSON</button>
        <label class="btn">Nhập JSON <input type="file" accept="application/json" style="display:none" onchange="importData(event)"></label>
        <button class="danger" onclick="signOut()">Đăng xuất</button>
      </div>
    </details>
  </div>
  <div id="message"></div>
  <div id="qdAuthGate"></div>
  <div class="tabs">
    <button class="tab" onclick="showTab('setup',this)">Cấu hình</button>
    <button class="tab" onclick="showTab('quick',this)">Nhập</button>
    <button class="tab active" onclick="showTab('dashboard',this)">Tổng quan</button>
    <button class="tab" onclick="showTab('track',this)">Lô nhanh</button>
    <button class="tab" onclick="showTab('customers',this)">Công nợ</button>
    <button class="tab" onclick="showTab('lots',this)">Lô hàng</button>
    <button class="tab" onclick="showTab('cnSales',this)">销售清单</button>
    <button class="tab" onclick="showTab('flows',this)">Dòng tiền</button>
    <button class="tab" onclick="showTab('exchange',this)">Đổi tiền</button>
    <button class="tab" onclick="showTab('fuhui',this)">付汇</button>
    <button class="tab" onclick="showTab('stats',this)">Mã/CK</button>
    <button class="tab" onclick="showTab('history',this)">Lịch sử</button>
    <button class="tab" onclick="showTab('settings',this)">Danh mục</button>
    <span class="tab-spacer"></span>
    <button class="tab finance-tab" onclick="showTab('opening',this)">Số dư</button>
    <button class="tab finance-tab" onclick="showTab('financeDash',this)">Dashboard</button>
  </div>
  <section id="setup" class="tabpane hide"></section>
  <section id="opening" class="tabpane hide"></section>
  <section id="quick" class="tabpane hide"></section>
  <section id="dashboard" class="tabpane"></section>
  <section id="financeDash" class="tabpane hide"></section>
  <section id="track" class="tabpane hide"></section>
  <section id="customers" class="tabpane hide"></section>
  <section id="lots" class="tabpane hide"></section>
  <section id="cnSales" class="tabpane hide"></section>
  <section id="sales" class="tabpane hide"></section>
  <section id="flows" class="tabpane hide"></section>
  <section id="exchange" class="tabpane hide"></section>
  <section id="fuhui" class="tabpane hide"></section>
  <section id="detail" class="tabpane hide"></section>
  <section id="stats" class="tabpane hide"></section>
  <section id="history" class="tabpane hide"><div id="historyPanel"></div></section>
  <section id="settings" class="tabpane hide"></section>
</div>
<script src="app.js"></script>
</body>
</html>
